services:
  siglog:
    image: ghcr.io/brandesdavid/siglog-pi:latest
    build: .
    container_name: siglog
    restart: unless-stopped
    privileged: false
    devices:
      - /dev/bus/usb:/dev/bus/usb
      - /dev/ttyAMA0:/dev/ttyAMA0
    network_mode: host
    environment:
      - GPS_DEVICE=/dev/ttyAMA0
      - GPS_BAUD=9600
      - DUMP1090_JSON=/app/data/dump1090/aircraft.json
      - API_PORT=80
      - LOG_LEVEL=INFO
      - FAKE_SIGNALS=0
    volumes:
      - siglog_data:/app/data
      - /run/udev:/run/udev:ro
    deploy:
      resources:
        limits:
          memory: 350M
        reservations:
          memory: 100M
    healthcheck:
      test: ["CMD", "python3", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:80/api/health', timeout=3)"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 20s

volumes:
  siglog_data:
