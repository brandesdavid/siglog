services:
  siglog:
    image: ghcr.io/brandesdavid/siglog-pi:latest
    container_name: siglog
    restart: unless-stopped
    privileged: false
    devices:
      - /dev/bus/usb:/dev/bus/usb
    network_mode: host
    environment:
      - GPS_DEVICE=/dev/ttyAMA0
      - GPS_BAUD=9600
      - DUMP1090_JSON=/app/data/dump1090/aircraft.json
      - API_PORT=80
      - LOG_LEVEL=INFO
      - FAKE_SIGNALS=0
      - SCHEDULER_ENABLED=1
      - SIGLOG_LAT=52.52
      - SIGLOG_LON=13.405
      - NOAA_NOTIFY_MINUTES=15
      - LOG_COOLDOWN_SEC=1800
    volumes:
      - siglog_data:/app/data
      - ${SIGLOG_CONTROL_DIR:-./control}:/app/data/control
      - /run/udev:/run/udev:ro
    healthcheck:
      test: ["CMD", "python3", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:80/api/health', timeout=3)"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 20s

volumes:
  siglog_data:
